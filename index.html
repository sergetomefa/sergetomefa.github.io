<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Image Rotative Responsive</title>
     <link rel="icon" type="image/png" href="./icon.png">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: black;
        }

        .container {
            width: 100vw;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .image-wrapper {
            /* L'image carrée prend toute la largeur disponible sans déborder */
            width: min(100vw - 40px, 100vh - 40px);
            aspect-ratio: 1 / 1;
            position: relative;
        }

        .rotating-image {
            width: 100%;
            height: 100%;
            object-fit: cover;
            border-radius: 16px;
            /* Animation de rotation sur elle-même */
            animation: spin 20s linear infinite;
            /* Ombre pour l'esthétique */

        }

        @keyframes spin {
            from {
                transform: rotate(0deg);
            }
            to {
                transform: rotate(360deg);
            }
        }

        /* Effet de halo autour de l'image */
        .image-wrapper::before {
            content: '';
            position: absolute;
            top: -10px;
            left: -10px;
            right: -10px;
            bottom: -10px;
            border-radius: 24px;
 
            opacity: 0.3;
            animation: spin 20s linear infinite;
            z-index: -1;
            
        }

        /* Texte indicatif */
        .label {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            color: rgba(255,255,255,0.4);
            font-family: 'Segoe UI', sans-serif;
            font-size: 0.85rem;
            letter-spacing: 2px;
            text-transform: uppercase;
            pointer-events: none;
        }
    </style>
<base target="_blank">
</head>
<body>
    <div class="container">
        <div class="image-wrapper">
            <!-- Remplacez src par le chemin de votre image -->
            <img 
                src="./earth.png" 
                alt="Image rotative" 
                class="rotating-image"
                id="mainImage"
            >
        </div>
    </div>


    <script>
        // Détection si l'image ne charge pas (fallback)
        const img = document.getElementById('mainImage');
        img.onerror = function() {
            // Crée un canvas avec un pattern si l'image externe échoue
            const canvas = document.createElement('canvas');
            canvas.width = 800;
            canvas.height = 800;
            const ctx = canvas.getContext('2d');

            // Dessiner un motif géométrique
            const gradient = ctx.createLinearGradient(0, 0, 800, 800);
            gradient.addColorStop(0, '#0f172a');
            gradient.addColorStop(0.5, '#1e293b');
            gradient.addColorStop(1, '#0f172a');
            ctx.fillStyle = gradient;
            ctx.fillRect(0, 0, 800, 800);

            // Cercles concentriques
            for (let i = 0; i < 20; i++) {
                ctx.beginPath();
                ctx.arc(400, 400, i * 20, 0, Math.PI * 2);
                ctx.strokeStyle = `rgba(0, 240, 255, ${0.1 + i * 0.02})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // Lignes diagonales
            ctx.strokeStyle = 'rgba(124, 58, 237, 0.2)';
            ctx.lineWidth = 1;
            for (let i = -800; i < 1600; i += 40) {
                ctx.beginPath();
                ctx.moveTo(i, 0);
                ctx.lineTo(i + 800, 800);
                ctx.stroke();
            }

            // Texte central
            ctx.fillStyle = '#00f0ff';
            ctx.font = 'bold 60px Arial';
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText('FULL SCALE', 400, 360);
            ctx.fillStyle = '#ff2d7a';
            ctx.font = 'bold 60px Arial';
            ctx.fillText('RELEASE GATE', 400, 440);

            img.src = canvas.toDataURL();
        };
    </script>
</body>
</html>
